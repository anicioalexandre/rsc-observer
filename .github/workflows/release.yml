# Release via changesets + npm trusted publishing (OIDC).
#
# Two modes, both triggered by pushes to main:
#  1. Pending changesets exist  -> opens/updates the "Version Packages" PR.
#  2. No pending changesets (i.e. the Version PR just merged) -> publishes
#     rsc-observer to npm.
#
# Security model:
#  - NO npm token. Publishing authenticates per-run via GitHub OIDC
#    (`id-token: write`) against the trusted publisher configured on the
#    npm package settings (this repo + this workflow file). npm attaches
#    provenance attestations automatically.
#  - Actions are pinned by commit SHA.
#  - The publish path requires npm CLI >= 11.5.1 (OIDC support); we run on
#    Node 24 and upgrade npm explicitly so the floor is guaranteed.
#    `changeset publish` shells out to npm, so pnpm@9 elsewhere is fine.

name: release

on:
  push:
    branches: [main]

# Never cancel an in-flight publish; queue instead.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # version PR branch, tags, GitHub releases
      pull-requests: write # open/update the Version Packages PR
      id-token: write # OIDC token for npm trusted publishing
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Full history so changesets can attribute changelog entries.
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      # OIDC publishing needs npm >= 11.5.1; make the floor explicit
      # instead of trusting whatever the runner's Node bundles.
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest && npm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      # Cheap correctness gate before anything ships. The full e2e suite
      # runs in its own workflow on the same push.
      - name: Typecheck package
        run: pnpm --filter rsc-observer check-types

      - name: Version PR or publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
